spring:
  profiles:
    active: local
  datasource:
    # URL은 로컬 환경이므로 그대로 두어도 무방하지만, 외부 배포 시에는 이 또한 변수화합니다.
    url: jdbc:mysql://localhost:3306/finbank?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}  # 변수 처리
    password: ${DB_PASSWORD}  # 변수 처리
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      # Flyway가 스키마를 관리하므로 validate 사용
      # update는 변경 이력이 남지 않아 실무에서는 사용 금지
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

  flyway:
    enabled: true
    # baseline-version: 2
    #   - 기존 DB (테이블 이미 있음, Flyway 히스토리 없음):
    #     V1, V2 모두 baseline으로 마킹 → 실행 안 함 (이미 존재하므로)
    #   - 빈 DB (완전히 새 환경):
    #     baseline-on-migrate가 비어있는 DB에는 작동 안 함 → V1부터 순서대로 실행
    baseline-on-migrate: true
    baseline-version: 2
    locations: classpath:db/migration
server:
  port: 8080

jwt:
  # JWT 시크릿 키도 보안상 매우 중요하므로 변수화합니다.
  secret: ${JWT_SECRET_KEY}
  expiration-ms: 3600000          # Access Token: 1시간
  refresh-expiration-ms: 604800000 # Refresh Token: 7일

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off
    org.hibernate.stat: off
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/finbank?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: finuser
    password: finpass1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 개발 단계 — 자동 테이블 생성 //create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  h2:
    console:
      enabled: false   # H2 콘솔 비활성화 (비필수)

server:
  port: 8080

jwt:
  secret: VerySecretJwtKeyForFinbankDemoProject123456
  expiration-ms: 3600000
